<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Eco-Track</title>
    <link rel="icon" type="image/png" href="../user/user-images/Eco-track-white-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="user-style.css">
</head>
<body>

    <!-- Top Navbar -->
    <header class="top-navbar">
        <div class="nav-left">
            <img src="../user/user-images/Eco-track-white-logo.png" alt="Eco-Track Logo" class="logo">
            <span class="brand-text">Eco-Track</span>
        </div>
        <div class="nav-right">
            <div class="user-badge">
                <i class="fa-solid fa-circle-user"></i>
                <span>Eco Champion</span>
            </div>
            <a href="../../index.html" class="logout-link">Logout</a>
        </div>
    </header>

<div class="layout-wrapper">
        <nav class="side-column">
            <div class="side-nav-wrapper">
                <ul class="side-links">
                    <li><a href="user-dashboard.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a></li>
                    <li><a href="user-pickup.html"><i class="fa-solid fa-truck-pickup"></i> Request Pickup</a></li>
                    <li><a href="user-livetracking.html"><i class="fa-solid fa-map-location-dot"></i> Live Tracking</a></li>
                    <li><a href="user-reward.html"><i class="fa-solid fa-gift"></i> My Rewards</a></li>
                    <li><a href="user-profile.html" class="active"><i class="fa-solid fa-user-gear"></i> My Profile</a></li>
                </ul>
            </div>
            <div class="side-footer">
                <p>© 2026 Eco-Track UAE</p>
            </div>
        </nav>


<main class="content-area">
    <div class="welcome-banner">
        <h1>Account <span class="highlight">Settings</span></h1>
    </div>

     <div class="profile-layout">
    
    <!-- Section 1: Personal Details -->
    <div class="premium-card branded-border">
    <div class="card-header-row">
    <div class="icon-title">
    <div class="icon-hex"><i class="fa-solid fa-user"></i></div>
        <h3>Personal Information</h3>
    </div>
    </div>
    
   <form id="profileInfoForm">
    <div class="form-grid-3-col">
    <div class="input-group">
    <label>First Name</label>
    <input type="text" placeholder="Enter first name" required>
    </div>
                           
    <div class="input-group">
    <label>Last Name</label>
    <input type="text" placeholder="Enter last name" required>
    </div>
                            
    <div class="input-group">
    <label>Gender</label>
    <select required>
    <option value="" disabled selected>Select Gender</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    </select>
    </div>

    <div class="input-group">
    <label>City</label>
    <select>
    <option>Dubai</option>
    <option>Sharjah</option>
    <option>Abu Dhabi</option>
    <option>Fujairah</option>
    <option>Ajman</option>
    <option>Ras al Khaimah</option>
    <option>Umm al-Quwain</option>
    </select>
    </div>

    <div class="input-group">
    <label>Phone Number</label>
    <input type="tel" placeholder="+971">
    </div>

    <div class="input-group">
    <label>Email Address</label>
    <input type="email" placeholder="yourmail@gmail.com">
    </div>
    </div>
                        
    <div class="form-action">
    <button type="submit" class="main-cta-btn">Update Profile</button>
    </div>

    </form>
    </div>

    <!-- Section 2: Security -->
    <div class="premium-card password-border">
    <div class="card-header-row">
    <div class="icon-title">
    <div class="icon-hex blue"><i class="fa-solid fa-lock"></i></div>
    <h3>Security Settings</h3>
    </div>
    </div>

    <form id="passwordForm">
    <div class="form-grid-3-col">
    <div class="input-group">
    <label>Current Password</label>
    <input type="password" placeholder="••••••••">
    </div>
                            
    <div class="input-group">
    <label>New Password</label>
    <input type="password" placeholder="New password">
    </div>
                            
    <div class="input-group">
    <label>Retype New Password</label>
    <input type="password" placeholder="Confirm password">
    </div>
    </div>
                        
    <div class="form-action">
    <button type="submit" class="main-cta-btn secondary">Change Password</button>
    </div>
    </form>
    </div>
    </div>
</main>
</div>

</body>
</html>
